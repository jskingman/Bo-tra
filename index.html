<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Body Tracker">
<meta name="theme-color" content="#0f0d09">
<title>Body Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0d09;
    --bg2: #161410;
    --gold: #e8c547;
    --gold2: rgba(232,197,71,0.12);
    --red: #e87347;
    --green: #47e8a8;
    --blue: #47a8e8;
    --purple: #c847e8;
    --pink: #e84778;
    --orange: #e8a847;
    --text: #f0ece0;
    --muted: #8a8070;
    --dim: #6a6050;
    --border: rgba(255,255,255,0.07);
    --card: rgba(255,255,255,0.04);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100%; padding-top: var(–safe-top); }

/* Header */
.header { padding: 16px 20px 14px; border-bottom: 1px solid rgba(232,197,71,0.2); background: rgba(232,197,71,0.03); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.header-left .eyebrow { font-size: 9px; color: var(–muted); letter-spacing: 0.18em; text-transform: uppercase; }
.header-left .title { font-family: ‘Syne’, sans-serif; font-size: 20px; font-weight: 800; color: var(–gold); line-height: 1.1; }
.header-right { text-align: right; }
.header-right .status { font-size: 9px; margin-bottom: 2px; }
.header-right .last-update { font-size: 10px; color: var(–muted); }
.header-right .last-date { font-size: 12px; color: #c0b890; }

/* Nav */
.nav { display: flex; border-bottom: 1px solid var(–border); padding: 0 12px; flex-shrink: 0; background: var(–bg); }
.nav-btn { flex: 1; background: none; border: none; color: var(–dim); padding: 12px 4px 10px; font-size: 9px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 2px solid transparent; font-family: inherit; transition: color 0.2s; }
.nav-btn.active { color: var(–gold); border-bottom-color: var(–gold); }

/* Scrollable content */
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px calc(16px + var(–safe-bottom)); }

/* Cards */
.card { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 13px; }
.card + .card { margin-top: 10px; }

/* Grid */
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* KPI cards */
.kpi { background: var(–card); border: 1px solid var(–border); border-radius: 12px; padding: 12px 10px; }
.kpi .kpi-label { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.kpi .kpi-value { font-family: ‘Syne’, sans-serif; font-size: 16px; font-weight: 700; line-height: 1.1; }
.kpi .kpi-sub { font-size: 9px; color: var(–dim); margin-top: 3px; }

/* Measure row */
.measure { background: rgba(255,255,255,0.03); border: 1px solid var(–border); border-radius: 9px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
.measure .m-label { font-size: 9px; color: var(–muted); margin-bottom: 2px; }
.measure .m-value { font-size: 15px; font-weight: 600; color: var(–text); }
.measure .m-unit { font-size: 9px; color: var(–dim); margin-left: 2px; }
.measure .m-goal { font-size: 9px; color: var(–red); margin-top: 1px; }
.measure .m-delta { font-size: 12px; font-weight: 700; }

/* Section label */
.section-label { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.12em; margin: 14px 0 8px; }

/* Nutrition box */
.nutrition-box { background: rgba(232,197,71,0.05); border: 1px solid rgba(232,197,71,0.18); border-radius: 12px; padding: 14px; margin-top: 12px; }
.nutrition-box .n-label { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.nutrition-item { text-align: center; }
.nutrition-item .ni-label { font-size: 9px; color: var(–muted); margin-bottom: 2px; }
.nutrition-item .ni-value { font-family: ‘Syne’, sans-serif; font-size: 15px; font-weight: 700; color: var(–gold); }
.nutrition-item .ni-unit { font-size: 9px; color: var(–muted); }
.nutrition-badge { margin-top: 10px; padding: 6px 10px; background: rgba(71,232,168,0.08); border-radius: 6px; font-size: 10px; color: var(–green); }

/* Chart pills */
.pill { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #a09880; border-radius: 20px; padding: 5px 11px; font-size: 9px; cursor: pointer; font-family: inherit; font-weight: 400; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
.pill.active { font-weight: 700; }
.pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }

/* Chart container */
.chart-wrap { background: rgba(255,255,255,0.03); border: 1px solid var(–border); border-radius: 12px; padding: 14px 10px 10px; }
.chart-label { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-left: 4px; }
.chart-canvas-wrap { position: relative; height: 180px; }
.chart-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
.chart-stat { background: rgba(255,255,255,0.03); border: 1px solid var(–border); border-radius: 9px; padding: 9px; text-align: center; }
.chart-stat .cs-label { font-size: 9px; color: var(–muted); margin-bottom: 3px; }
.chart-stat .cs-value { font-size: 12px; font-weight: 700; }

/* Empty chart */
.chart-empty { text-align: center; color: var(–dim); padding: 50px 20px; font-size: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(–border); line-height: 1.7; }

/* History entries */
.history-entry { background: rgba(255,255,255,0.03); border: 1px solid var(–border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.history-date { font-family: ‘Syne’, sans-serif; font-weight: 700; color: var(–gold); font-size: 13px; }
.history-meta { display: flex; gap: 8px; align-items: center; }
.history-note { font-size: 10px; color: var(–dim); font-style: italic; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.delete-btn { background: none; border: none; color: var(–red); cursor: pointer; font-size: 15px; padding: 0 2px; opacity: 0.7; }
.delete-btn:active { opacity: 1; }
.history-measures { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
.hm-item { font-size: 10px; }
.hm-label { color: var(–dim); }
.hm-val { color: #c0b890; }

/* Form */
.form-section { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.12em; margin: 16px 0 8px; }
.form-group { margin-bottom: 0; }
.form-label { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; display: block; }
.form-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(–text); padding: 9px 12px; font-size: 15px; width: 100%; outline: none; font-family: inherit; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: rgba(232,197,71,0.4); }
.form-input::placeholder { color: var(–dim); font-size: 13px; }

.save-btn { width: 100%; background: var(–gold); border: none; color: #0f0d09; border-radius: 10px; padding: 15px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: ‘Syne’, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.3s, transform 0.1s; margin-top: 16px; }
.save-btn:active { transform: scale(0.98); }
.save-btn.saved { background: var(–green); }

/* Export/Import */
.export-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(–border); }
.export-label { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
.action-btn { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(–border); color: var(–text); border-radius: 8px; padding: 11px; font-size: 11px; cursor: pointer; font-family: inherit; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; transition: background 0.2s; }
.action-btn:active { background: rgba(255,255,255,0.1); }
.action-btn.danger { color: var(–red); border-color: rgba(232,115,71,0.3); }

/* Toast */
.toast { position: fixed; bottom: calc(20px + var(–safe-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a14; border: 1px solid rgba(232,197,71,0.4); color: var(–gold); padding: 10px 20px; border-radius: 20px; font-size: 12px; transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* Install banner */
.install-banner { background: rgba(71,168,232,0.08); border: 1px solid rgba(71,168,232,0.2); border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 11px; color: var(–blue); line-height: 1.6; }
.install-banner strong { color: #7dd3f8; }

@media (prefers-color-scheme: light) {
/* Keep dark anyway */
}
</style>

</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">Body Tracker</div>
      <div class="title">27 anni · 165 cm · ♂</div>
    </div>
    <div class="header-right">
      <div class="status" id="status-text"></div>
      <div class="last-update">Ultimo agg.</div>
      <div class="last-date" id="last-date">—</div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-view="dashboard">Dashboard</button>
    <button class="nav-btn" data-view="grafico">Grafico</button>
    <button class="nav-btn" data-view="storico">Storico</button>
    <button class="nav-btn" data-view="aggiungi">+ Aggiungi</button>
  </div>

  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'body-tracker-giacomo-v1';
const TDEE = 2936;
const HEIGHT = 165;

const SEED = [
  { date:'2025-03-10', weight:80.5, waistHigh:93, waist:93, waistLow:94.2, hips:101, bicep:38.6, neck:40, chest:105, thighHigh:62, thigh:59, thighLow:49, calories:2200, proteins:140, steps:12000, bodyFat:null, note:'Inizio dieta' },
  { date:'2026-04-21', weight:77.8, waistHigh:93, waist:93, waistLow:94.2, hips:101, bicep:38.6, neck:40, chest:105, thighHigh:62, thigh:59, thighLow:49, calories:2200, proteins:140, steps:12000, bodyFat:23.4, note:'Dati attuali' },
];

const FIELDS = [
  { key:'weight',    label:'Peso',     unit:'kg', color:'#e8c547', goal:74   },
  { key:'waist',     label:'Vita',     unit:'cm', color:'#e87347', goal:88   },
  { key:'hips',      label:'Fianchi',  unit:'cm', color:'#47a8e8', goal:98   },
  { key:'chest',     label:'Petto',    unit:'cm', color:'#47e8a8', goal:null },
  { key:'bicep',     label:'Bicipite', unit:'cm', color:'#c847e8', goal:null },
  { key:'thighHigh', label:'Coscia',   unit:'cm', color:'#e84778', goal:null },
  { key:'bodyFat',   label:'% Grasso', unit:'%',  color:'#e8a847', goal:15   },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let entries = [];
let currentView = 'dashboard';
let currentMetric = 'weight';
let chartInstance = null;

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return null;
}

function saveEntries() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    updateStatus('ok');
  } catch(e) {
    updateStatus('error');
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('it-IT', { day:'2-digit', month:'short' });
}

function fmtDateLong(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('it-IT', { day:'2-digit', month:'long', year:'numeric' });
}

function calcNavyBF(neck, waist, hips) {
  if (!neck || !waist || !hips || neck<=0 || waist<=0 || hips<=0) return null;
  const arg = waist + hips - neck;
  if (arg <= 0) return null;
  const bf = 495 / (1.0324 - 0.19077 * Math.log10(arg) + 0.15456 * Math.log10(HEIGHT)) - 450;
  if (!isFinite(bf) || bf < 3 || bf > 50) return null;
  return Math.round(bf * 10) / 10;
}

function getLatest() { return entries[entries.length - 1] || SEED[1]; }
function getFirst()  { return entries[0] || SEED[0]; }

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updateStatus(state) {
  const el = document.getElementById('status-text');
  if (state === 'ok') {
    el.style.color = '#47e8a8';
    el.textContent = `✓ ${entries.length} misur. salvate`;
  } else if (state === 'error') {
    el.style.color = '#e87347';
    el.textContent = '⚠ errore salvataggio';
  }
}

function updateHeader() {
  const latest = getLatest();
  document.getElementById('last-date').textContent = fmtDate(latest.date);
  updateStatus('ok');
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function renderDashboard() {
  const latest = getLatest();
  const first  = getFirst();
  const bfVal  = latest.bodyFat || calcNavyBF(latest.neck, latest.waist, latest.hips);
  const bfSrc  = latest.bodyFat ? 'bilancia' : 'formula Navy';
  const deficit = TDEE - (latest.calories || 2200);
  const wLoss   = ((deficit * 7) / 7700).toFixed(2);
  const dW      = (latest.weight - first.weight).toFixed(1);
  const protRatio = ((latest.proteins || 140) / (latest.weight || 77.8)).toFixed(1);

  const isStandalone = window.navigator.standalone;

  return `
    ${!isStandalone ? `
    <div class="install-banner">
      📱 <strong>Installa come app:</strong> tocca <strong>Condividi</strong> in Safari → <strong>"Aggiungi a schermata Home"</strong>. Funzionerà offline!
    </div>` : ''}

    <div class="grid-3" style="margin-bottom:12px">
      <div class="kpi">
        <div class="kpi-label">Peso</div>
        <div class="kpi-value" style="color:#e8c547">${latest.weight} kg</div>
        <div class="kpi-sub">${dW >= 0 ? '+' : ''}${dW} kg dal via</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Grasso</div>
        <div class="kpi-value" style="color:#e8a847">${bfVal ? bfVal + '%' : '—'}</div>
        <div class="kpi-sub">${bfVal ? bfSrc : '—'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Deficit</div>
        <div class="kpi-value" style="color:#47e8a8">-${deficit}</div>
        <div class="kpi-sub">~${wLoss} kg/sett</div>
      </div>
    </div>

    <div class="section-label">Misure corporee</div>
    <div class="grid-2">
      ${[
        { label:'Vita',        v:latest.waist,     p:first.waist,     u:'cm', goal:88 },
        { label:'Fianchi',     v:latest.hips,      p:first.hips,      u:'cm', goal:98 },
        { label:'Petto',       v:latest.chest,     p:first.chest,     u:'cm' },
        { label:'Bicipite',    v:latest.bicep,     p:first.bicep,     u:'cm' },
        { label:'Coscia Alta', v:latest.thighHigh, p:first.thighHigh, u:'cm' },
        { label:'Collo',       v:latest.neck,      p:first.neck,      u:'cm' },
      ].map(m => {
        const delta = (m.v && m.p) ? (m.v - m.p) : null;
        const dColor = delta === null ? '' : delta < 0 ? '#47e8a8' : delta > 0 ? '#e87347' : '#8a8070';
        return `
        <div class="measure">
          <div>
            <div class="m-label">${m.label}</div>
            <div class="m-value">${m.v || '—'}<span class="m-unit">${m.u}</span></div>
            ${m.goal && m.v && m.v > m.goal ? `<div class="m-goal">→ ${m.goal} cm</div>` : ''}
          </div>
          ${delta !== null ? `<div class="m-delta" style="color:${dColor}">${delta > 0 ? '+' : ''}${delta.toFixed(1)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>

    <div class="nutrition-box">
      <div class="n-label">Nutrizione</div>
      <div class="grid-3">
        <div class="nutrition-item"><div class="ni-label">TDEE</div><div class="ni-value">${TDEE}<span class="ni-unit">kcal</span></div></div>
        <div class="nutrition-item"><div class="ni-label">Intake</div><div class="ni-value">${latest.calories||2200}<span class="ni-unit">kcal</span></div></div>
        <div class="nutrition-item"><div class="ni-label">Proteine</div><div class="ni-value">${latest.proteins||140}<span class="ni-unit">g</span></div></div>
      </div>
      <div class="nutrition-badge">✓ ${protRatio}g/kg · Target ≥1.8g/kg</div>
    </div>
  `;
}

function renderGrafico() {
  const field = FIELDS.find(f => f.key === currentMetric);
  const chartPoints = entries.filter(e => {
    const v = e[currentMetric];
    return typeof v === 'number' && v > 0 && isFinite(v);
  });

  const pillsHtml = FIELDS.map(f => `
    <button class="pill ${currentMetric === f.key ? 'active' : ''}" 
      style="${currentMetric === f.key ? `background:${f.color};border-color:${f.color};color:#0f0d09` : ''}"
      onclick="setMetric('${f.key}')">${f.label}</button>
  `).join('');

  let statsHtml = '';
  if (chartPoints.length >= 2) {
    const vals = chartPoints.map(e => e[currentMetric]);
    const delta = vals[vals.length-1] - vals[0];
    const dColor = delta < 0 ? '#47e8a8' : delta > 0 ? '#e87347' : '#8a8070';
    statsHtml = `
      <div class="chart-stats">
        <div class="chart-stat"><div class="cs-label">Inizio</div><div class="cs-value">${vals[0]} ${field.unit}</div></div>
        <div class="chart-stat"><div class="cs-label">Attuale</div><div class="cs-value">${vals[vals.length-1]} ${field.unit}</div></div>
        <div class="chart-stat"><div class="cs-label">Totale</div><div class="cs-value" style="color:${dColor}">${delta>=0?'+':''}${delta.toFixed(1)} ${field.unit}</div></div>
      </div>`;
  }

  return `
    <div class="pills">${pillsHtml}</div>
    ${chartPoints.length < 2 
      ? `<div class="chart-empty">Aggiungi almeno 2 misurazioni di<br><span style="color:${field.color}">${field.label}</span><br>per vedere il grafico.</div>`
      : `<div class="chart-wrap">
          <div class="chart-label">${field.label} — ${chartPoints.length} misurazioni</div>
          <div class="chart-canvas-wrap"><canvas id="mainChart"></canvas></div>
        </div>
        ${statsHtml}`
    }
  `;
}

function renderStorico() {
  if (entries.length === 0) return '<p style="color:var(--muted);font-size:12px;text-align:center;padding:40px 0">Nessuna misurazione salvata.</p>';
  
  return `
    <p style="font-size:10px;color:var(--muted);margin-bottom:12px">${entries.length} misurazioni · tocca 🗑 per eliminare</p>
    ${[...entries].reverse().map(e => `
      <div class="history-entry">
        <div class="history-header">
          <div class="history-date">${fmtDate(e.date)}</div>
          <div class="history-meta">
            ${e.note ? `<div class="history-note">${e.note}</div>` : ''}
            <button class="delete-btn" onclick="deleteEntry('${e.date}')">🗑</button>
          </div>
        </div>
        <div class="history-measures">
          ${[
            { l:'Peso',    v:e.weight,  u:'kg' },
            { l:'Vita',    v:e.waist,   u:'cm' },
            { l:'Fianchi', v:e.hips,    u:'cm' },
            { l:'Petto',   v:e.chest,   u:'cm' },
            { l:'Bicipite',v:e.bicep,   u:'cm' },
            { l:'Grasso',  v:e.bodyFat, u:'%'  },
          ].filter(m => m.v).map(m => `
            <div class="hm-item"><span class="hm-label">${m.l}: </span><span class="hm-val">${m.v}${m.u}</span></div>
          `).join('')}
        </div>
      </div>
    `).join('')}

    <div class="export-section">
      <div class="export-label">Backup dati</div>
      <button class="action-btn" onclick="exportData()">📤 Esporta JSON</button>
      <button class="action-btn" onclick="triggerImport()">📥 Importa JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <button class="action-btn danger" onclick="confirmReset()">🗑 Cancella tutti i dati</button>
    </div>
  `;
}

function renderAggiungi() {
  const latest = getLatest();
  const today = new Date().toISOString().split('T')[0];
  return `
    <p style="font-size:11px;color:var(--muted);margin-bottom:4px">Compila solo i campi misurati oggi.</p>
    <p style="font-size:10px;color:var(--dim);margin-bottom:0">I valori precedenti vengono mantenuti.</p>

    <div class="form-section">Data</div>
    <div class="form-group">
      <input type="date" class="form-input" id="f-date" value="${today}">
    </div>

    <div class="form-section">Peso & Composizione</div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Peso (kg)</label>
        <input type="number" step="0.1" class="form-input" id="f-weight" placeholder="${latest.weight||''}">
      </div>
      <div class="form-group">
        <label class="form-label">% Grasso (bilancia)</label>
        <input type="number" step="0.1" class="form-input" id="f-bodyFat" placeholder="${latest.bodyFat||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Collo (cm)</label>
        <input type="number" step="0.1" class="form-input" id="f-neck" placeholder="${latest.neck||''}">
      </div>
    </div>

    <div class="form-section">Circonferenze (cm)</div>
    <div class="grid-2">
      ${[
        { id:'f-chest',    label:'Petto',       ph:latest.chest    },
        { id:'f-bicep',    label:'Bicipite',    ph:latest.bicep    },
        { id:'f-waistHigh',label:'Vita Alta',   ph:latest.waistHigh},
        { id:'f-waist',    label:'Vita',        ph:latest.waist    },
        { id:'f-waistLow', label:'Vita Bassa',  ph:latest.waistLow },
        { id:'f-hips',     label:'Fianchi',     ph:latest.hips     },
        { id:'f-thighHigh',label:'Coscia Alta', ph:latest.thighHigh},
        { id:'f-thigh',    label:'Coscia',      ph:latest.thigh    },
        { id:'f-thighLow', label:'Coscia Bassa',ph:latest.thighLow },
      ].map(f => `
        <div class="form-group">
          <label class="form-label">${f.label}</label>
          <input type="number" step="0.1" class="form-input" id="${f.id}" placeholder="${f.ph||''}">
        </div>
      `).join('')}
    </div>

    <div class="form-section">Nutrizione & Attività</div>
    <div class="grid-3">
      ${[
        { id:'f-calories', label:'Calorie',    ph:latest.calories },
        { id:'f-proteins', label:'Proteine g', ph:latest.proteins },
        { id:'f-steps',    label:'Passi',      ph:latest.steps    },
      ].map(f => `
        <div class="form-group">
          <label class="form-label">${f.label}</label>
          <input type="number" class="form-input" id="${f.id}" placeholder="${f.ph||''}">
        </div>
      `).join('')}
    </div>

    <div class="form-section">Nota</div>
    <div class="form-group">
      <input type="text" class="form-input" id="f-note" placeholder="es. Prima settimana...">
    </div>

    <button class="save-btn" id="save-btn" onclick="saveEntry()">Salva misurazione</button>
  `;
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function drawChart() {
  const canvas = document.getElementById('mainChart');
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const field = FIELDS.find(f => f.key === currentMetric);
  const points = entries.filter(e => {
    const v = e[currentMetric];
    return typeof v === 'number' && v > 0 && isFinite(v);
  });

  const labels = points.map(e => fmtDate(e.date));
  const data   = points.map(e => e[currentMetric]);

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: field.color,
        backgroundColor: field.color + '18',
        borderWidth: 2.5,
        pointBackgroundColor: field.color,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1710',
          borderColor: 'rgba(232,197,71,0.3)',
          borderWidth: 1,
          titleColor: '#e8c547',
          bodyColor: '#f0ece0',
          callbacks: {
            label: ctx => `${ctx.parsed.y} ${field.unit}`
          }
        },
        ...(field.goal ? {
          annotation: {
            annotations: {
              goalLine: {
                type: 'line',
                yMin: field.goal, yMax: field.goal,
                borderColor: field.color + '80',
                borderDash: [5, 4],
                borderWidth: 1.5,
              }
            }
          }
        } : {})
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6a6050', font: { size: 9, family: 'JetBrains Mono' } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6a6050', font: { size: 9, family: 'JetBrains Mono' } } }
      }
    }
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  render();
}

function setMetric(m) {
  currentMetric = m;
  render();
}

function saveEntry() {
  const keyMap = {
    date:'f-date', weight:'f-weight', bodyFat:'f-bodyFat', neck:'f-neck',
    chest:'f-chest', bicep:'f-bicep', waistHigh:'f-waistHigh', waist:'f-waist',
    waistLow:'f-waistLow', hips:'f-hips', thighHigh:'f-thighHigh',
    thigh:'f-thigh', thighLow:'f-thighLow', calories:'f-calories',
    proteins:'f-proteins', steps:'f-steps', note:'f-note'
  };

  const date = document.getElementById('f-date')?.value;
  if (!date) { showToast('Inserisci una data'); return; }

  const existing = entries.find(e => e.date === date) || {};
  const entry = { ...existing, date, note: document.getElementById('f-note')?.value || '' };

  Object.entries(keyMap).forEach(([key, id]) => {
    if (key === 'date' || key === 'note') return;
    const el = document.getElementById(id);
    if (!el || el.value === '') return;
    const p = parseFloat(el.value);
    if (!isNaN(p)) entry[key] = p;
  });

  entries = [...entries.filter(e => e.date !== date), entry]
    .sort((a, b) => a.date.localeCompare(b.date));
  saveEntries();
  updateHeader();
  showToast('✓ Misurazione salvata!');
  setTimeout(() => setView('dashboard'), 1000);
}

function deleteEntry(date) {
  if (!confirm(`Eliminare la misurazione del ${fmtDate(date)}?`)) return;
  entries = entries.filter(e => e.date !== date);
  saveEntries();
  updateHeader();
  render();
  showToast('Eliminata');
}

function exportData() {
  const json = JSON.stringify(entries, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `body-tracker-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Esportato!');
}

function triggerImport() {
  document.getElementById('import-file')?.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!Array.isArray(parsed)) throw new Error();
      entries = parsed.sort((a, b) => a.date.localeCompare(b.date));
      saveEntries();
      updateHeader();
      render();
      showToast(`✓ ${entries.length} misurazioni importate!`);
    } catch {
      showToast('❌ File non valido');
    }
  };
  reader.readAsText(file);
}

function confirmReset() {
  if (!confirm('Cancellare TUTTI i dati? Questa azione non è reversibile.')) return;
  entries = [...SEED];
  saveEntries();
  updateHeader();
  render();
  showToast('Dati azzerati');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const content = document.getElementById('content');
  if (currentView === 'dashboard') content.innerHTML = renderDashboard();
  else if (currentView === 'grafico') { content.innerHTML = renderGrafico(); drawChart(); }
  else if (currentView === 'storico') content.innerHTML = renderStorico();
  else if (currentView === 'aggiungi') content.innerHTML = renderAggiungi();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.querySelector('.nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (btn) setView(btn.dataset.view);
});

const stored = loadEntries();
entries = stored || [...SEED];
if (!stored) saveEntries();
updateHeader();
render();
</script>

</body>
</html>
